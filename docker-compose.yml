services:
  api:
    build: .
    command: sh -c "python manage.py makemigrations accounts organizations audits && python manage.py migrate && python manage.py shell -c \"from config.bootstrap import ensure_system_roles, ensure_default_superuser; ensure_system_roles(); ensure_default_superuser()\" && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      DB_ENGINE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: admin_api
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready/', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: admin_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_api"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
